<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div id="main">
        <div class="playerMove" id="rockDiv">
            <button id="rockBtn">
                <div class="imgText whiteText">Rock</div>
            </button>
        </div>
        <div class="playerMove" id="paperDiv">
            <button id="paperBtn">
                <div class="imgText">Paper</div>
            </button>
        </div>
        <div class="playerMove" id="scissorsDiv">
            <button id="scissorsBtn">
                <div class="imgText whiteText">Scissors</div>
            </button>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
